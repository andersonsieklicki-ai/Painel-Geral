<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Omnichannel - Gerenciador SaaS</title>
    <style>
        :root {
            --primary: #003399;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-dark: #333;
            --terminal-bg: #1e1e1e;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-dark);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--primary);
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #218838; }
        .btn-danger { background-color: #dc3545; }
        .btn-danger:hover { background-color: #c82333; }
        .btn-edit { background-color: #ffc107; color: black; }
        
        /* Grid de Empresas */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-top: 4px solid var(--primary);
            display: flex;
            flex-direction: column;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
        }
        .status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 12px;
            color: white;
        }
        .status.online { background-color: #28a745; }
        .status.offline { background-color: #dc3545; }
        
        /* Terminal de Logs */
        .log-window {
            background-color: var(--terminal-bg);
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            height: 150px;
            overflow-y: auto;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            flex-grow: 1;
        }
        .log-error { color: #ff4444; }
        .log-info { color: #aaaaaa; }
        
        .card-actions {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }
        .card-actions button { flex: 1; }

        /* Modal Nova Empresa */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 500px;
            max-width: 90%;
        }
        .modal input, .modal textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0 20px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }
        .modal h2 { margin-top: 0; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Painel SaaS - Robôs de Atendimento</h2>
        <button class="btn" onclick="abrirModal()">+ Nova Empresa</button>
    </div>

    <div class="grid" id="painelEmpresas"></div>

    <div class="modal" id="modalEmpresa">
        <div class="modal-content">
            <h2>Configurar Robô</h2>
            
            <label>Nome da Empresa:</label>
            <input type="text" id="nomeEmpresa" placeholder="Ex: Farmácia São João">
            
            <label>Menu Pré-Pronto (Formato JSON para o Robô):</label>
            <textarea id="menuRobo" rows="8">{
  "saudacao": "Olá! Bem-vindo(a). Escolha uma opção:",
  "opcoes": {
    "1": "Fazer um Pedido",
    "2": "Falar com Atendente"
  }
}</textarea>
            
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="btn btn-danger" onclick="fecharModal()">Cancelar</button>
                <button class="btn" onclick="salvarEmpresa()">Salvar Configuração</button>
            </div>
        </div>
    </div>

    <script>
        // Simulando nosso Banco de Dados Inicial (Já desordenado para testar a ordem alfabética)
        let empresas = [
            { id: 2, nome: 'Defesa Civil - Capanema', status: 'offline', logs: [] },
            { id: 1, nome: 'Associação de Água São Luiz', status: 'online', logs: [] }
        ];

        // Função para desenhar as empresas na tela (Sempre em ordem alfabética)
        function renderizarPainel() {
            const painel = document.getElementById('painelEmpresas');
            painel.innerHTML = '';

            // Coloca em ordem alfabética
            empresas.sort((a, b) => a.nome.localeCompare(b.nome));

            empresas.forEach(emp => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        ${emp.nome}
                        <span class="status ${emp.status}">${emp.status.toUpperCase()}</span>
                    </div>
                    
                    <div class="log-window" id="logs-${emp.id}">
                        </div>

                    <div class="card-actions">
                        <button class="btn" onclick="simularQR(${emp.id})">🔗 Conectar WhatsApp</button>
                        <button class="btn btn-edit" onclick="abrirModal()">⚙️ Menu</button>
                        <button class="btn btn-danger">⏹️ Parar</button>
                    </div>
                `;
                painel.appendChild(card);
                atualizarTelaLogs(emp.id); // Puxa os logs existentes
            });
        }

        // Função para escrever no Mini-Terminal (Com limite de 50 linhas para não travar)
        function adicionarLog(empresaId, mensagem, tipo = 'normal') {
            const empresa = empresas.find(e => e.id === empresaId);
            if(!empresa) return;

            const hora = new Date().toLocaleTimeString();
            let classeCss = '';
            if (tipo === 'erro') classeCss = 'log-error';
            if (tipo === 'info') classeCss = 'log-info';

            // Adiciona o novo log
            empresa.logs.push(`<span class="${classeCss}">[${hora}] ${mensagem}</span>`);

            // Limpeza Automática: Se passar de 50 linhas, apaga a mais velha
            if (empresa.logs.length > 50) {
                empresa.logs.shift();
            }

            atualizarTelaLogs(empresaId);
        }

        function atualizarTelaLogs(empresaId) {
            const terminal = document.getElementById(`logs-${empresaId}`);
            if(terminal) {
                const empresa = empresas.find(e => e.id === empresaId);
                terminal.innerHTML = empresa.logs.join('<br>');
                // Rola a tela preta automaticamente para a última mensagem
                terminal.scrollTop = terminal.scrollHeight;
            }
        }

        // --- Funções da Interface ---
        function abrirModal() {
            document.getElementById('modalEmpresa').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modalEmpresa').style.display = 'none';
            document.getElementById('nomeEmpresa').value = '';
        }

        function salvarEmpresa() {
            const nome = document.getElementById('nomeEmpresa').value;
            if(!nome) return alert('Digite o nome da empresa!');
            
            // Cria a nova empresa e joga no banco de dados (array)
            const novaEmpresa = {
                id: Date.now(),
                nome: nome,
                status: 'offline',
                logs: []
            };
            empresas.push(novaEmpresa);
            fecharModal();
            renderizarPainel();
            
            // Simula um log inicial
            adicionarLog(novaEmpresa.id, 'Sessão criada. Aguardando leitura de QR Code...', 'info');
        }

        // Simulador para você ver os logs rodando sozinhos
        function simularQR(id) {
            adicionarLog(id, 'Gerando QR Code...');
            setTimeout(() => adicionarLog(id, 'QR Code lido com sucesso!', 'normal'), 2000);
            setTimeout(() => adicionarLog(id, 'Aviso: Cliente não enviou a matrícula', 'erro'), 4000);
        }

        // Inicia o painel assim que abre a página
        window.onload = () => {
            renderizarPainel();
            adicionarLog(1, 'Robô conectado. Aguardando mensagens...', 'normal');
            adicionarLog(2, 'Robô desconectado.', 'erro');
        };
    </script>
</body>
</html>
