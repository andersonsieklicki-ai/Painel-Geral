<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Central Omnichannel</title>
    <style>
        :root {
            --primary: #003399;
            --secondary: #f4f7f6;
            --text-dark: #2c3e50;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--secondary);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-dark);
        }
        .login-container {
            background: white;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
            text-align: center;
        }
        .login-container h2 {
            color: var(--primary);
            margin-bottom: 5px;
            font-size: 1.8rem;
        }
        .login-container p {
            color: #6c757d;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .input-group input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0,51,153,0.1);
        }
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #002266;
        }
        .error-msg {
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
            font-weight: bold;
        }
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
                border-radius: 0;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Área do Lojista</h2>
        <p>Acesse sua Central Omnichannel</p>
        
        <div class="input-group">
            <label for="email">E-mail Corporativo</label>
            <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
        </div>
        
        <div class="input-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
        </div>
        
        <button class="btn" id="btnLogin" onclick="fazerLogin()">Entrar no Painel</button>
        <div class="error-msg" id="erroMsg">Senha ou e-mail incorretos.</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4-2LavZt7iWPt2u71u-yRUYbIJu-Vzf0",
            authDomain: "central-omnichannel-saas.firebaseapp.com",
            projectId: "central-omnichannel-saas",
            storageBucket: "central-omnichannel-saas.firebasestorage.app",
            messagingSenderId: "869327159480",
            appId: "1:869327159480:web:605be5ec37ab688d44b44d",
            measurementId: "G-984WSSJBHP"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "painel-cliente.html";
            }
        });

        window.fazerLogin = function() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const btn = document.getElementById('btnLogin');
            const erro = document.getElementById('erroMsg');

            if(!email || !senha) {
                erro.innerText = "Preencha todos os campos.";
                erro.style.display = "block";
                return;
            }

            btn.innerText = "Autenticando...";
            btn.disabled = true;
            erro.style.display = "none";

            signInWithEmailAndPassword(auth, email, senha)
                .then((userCredential) => {
                    window.location.href = "painel-cliente.html";
                })
                .catch((error) => {
                    btn.innerText = "Entrar no Painel";
                    btn.disabled = false;
                    erro.innerText = "Falha no login. Verifique suas credenciais.";
                    erro.style.display = "block";
                });
        }

        // Permitir login com a tecla Enter
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                window.fazerLogin();
            }
        });
    </script>
</body>
</html>
