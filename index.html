<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Omnichannel - Login</title>
    <style>
        :root { --primary: #003399; --secondary: #f0f4f8; --text-dark: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--secondary); margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text-dark); }
        
        .container { display: flex; flex-wrap: wrap; background: white; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; max-width: 900px; width: 95%; }
        
        .box { padding: 40px; flex: 1; min-width: 300px; box-sizing: border-box; }
        .box-login { background-color: white; }
        .box-cadastro { background-color: #f8fafc; border-left: 1px solid #e2e8f0; }
        
        h2 { margin-top: 0; color: var(--primary); }
        p { color: #666; font-size: 14px; line-height: 1.5; margin-bottom: 20px; }
        
        label { font-size: 13px; font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: var(--primary); outline: none; }
        
        .btn { width: 100%; background-color: var(--primary); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 15px; transition: background 0.3s; }
        .btn:hover { background-color: #002266; }
        .btn-outline { background-color: transparent; border: 2px solid var(--primary); color: var(--primary); margin-top: 10px; }
        .btn-outline:hover { background-color: var(--primary); color: white; }

        .loader { display: none; text-align: center; color: var(--primary); font-size: 14px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="box box-login">
            <h2>🔑 Acesse seu Painel</h2>
            <p>Faça login para gerenciar sua automação de WhatsApp e disparos de mensagens.</p>
            
            <form id="formLogin">
                <label>E-mail Corporativo</label>
                <input type="email" id="loginEmail" placeholder="seu@email.com" required>
                
                <label>Senha</label>
                <input type="password" id="loginSenha" placeholder="••••••••" required>
                
                <button type="submit" class="btn">Entrar no Sistema</button>
                <div id="loaderLogin" class="loader">Autenticando... aguarde.</div>
            </form>
        </div>

        <div class="box box-cadastro">
            <h2>🚀 Criar Conta (Pré-cadastro)</h2>
            <p>Ainda não é cliente? Preencha os dados abaixo. Nossa equipe entrará em contato para liberar seu painel.</p>
            
            <form id="formCadastro">
                <label>Nome da Empresa</label>
                <input type="text" id="cadNome" placeholder="Ex: Farmácia São João" required>
                
                <label>E-mail de Contato</label>
                <input type="email" id="cadEmail" placeholder="contato@empresa.com" required>
                
                <label>Crie uma Senha (Mín. 6 caracteres)</label>
                <input type="password" id="cadSenha" placeholder="Crie uma senha forte" required>
                
                <button type="submit" class="btn btn-outline">Solicitar Cadastro</button>
                <div id="loaderCadastro" class="loader">Processando seu cadastro...</div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        // Importamos as funções de Auth e o sendEmailVerification:
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // COLOQUE SUAS CHAVES REAIS AQUI
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_PROJETO.firebaseapp.com",
            projectId: "SEU_PROJETO",
            storageBucket: "SEU_PROJETO.firebasestorage.app",
            messagingSenderId: "...",
            appId: "...",
            measurementId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- SISTEMA DE LOGIN ---
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('loaderLogin').style.display = 'block';

            const email = document.getElementById('loginEmail').value;
            const senha = document.getElementById('loginSenha').value;

            try {
                await signInWithEmailAndPassword(auth, email, senha);
                
                // Mágica para você acessar o Admin (Coloque o seu e-mail real aqui)
                if (email === 'admin@seuemail.com') {
                    window.location.href = 'painel-admin.html';
                } else {
                    window.location.href = 'painel-cliente.html';
                }
            } catch (error) {
                document.getElementById('loaderLogin').style.display = 'none';
                if (error.code === 'auth/invalid-credential') {
                    alert('❌ E-mail ou senha incorretos!');
                } else {
                    alert('Erro ao fazer login: ' + error.message);
                }
            }
        });

        // --- SISTEMA DE CADASTRO (Com verificação de email e duplicidade) ---
        document.getElementById('formCadastro').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('loaderCadastro').style.display = 'block';

            const nome = document.getElementById('cadNome').value;
            const email = document.getElementById('cadEmail').value;
            const senha = document.getElementById('cadSenha').value;

            try {
                // 1. Cria o usuário no sistema de autenticação
                const userCredential = await createUserWithEmailAndPassword(auth, email, senha);
                
                // 2. Dispara o E-mail de Confirmação Oficial do Google
                await sendEmailVerification(userCredential.user);
                
                // 3. Salva os dados na coleção de 'empresas' no banco de dados
                await setDoc(doc(db, "empresas", userCredential.user.uid), {
                    nomeEmpresa: nome,
                    email: email,
                    statusRobo: 'pendente',
                    plano: '', // Fica vazio até o admin aprovar
                    dataCadastro: new Date().toISOString()
                });

                document.getElementById('loaderCadastro').style.display = 'none';
                alert(`✅ Cadastro realizado com sucesso!\n\nUm e-mail de verificação foi enviado para ${email}. Por favor, verifique sua caixa de entrada e a pasta de Spam.\n\nNossa equipe avaliará seu pré-cadastro e entrará em contato em breve.`);
                
                // Limpa o formulário de cadastro
                document.getElementById('formCadastro').reset();

            } catch (error) {
                document.getElementById('loaderCadastro').style.display = 'none';
                
                // 4. Verificações rígidas de Segurança
                if (error.code === 'auth/email-already-in-use') {
                    alert("⚠️ ATENÇÃO: Este e-mail já está cadastrado em nosso sistema! Por favor, utilize a área de Login ao lado.");
                } else if (error.code === 'auth/weak-password') {
                    alert("⚠️ SEGURANÇA: Sua senha é muito fraca. Ela deve conter pelo menos 6 caracteres.");
                } else {
                    alert("Erro no cadastro: " + error.message);
                }
            }
        });
    </script>

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode === 123) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode === 'I'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode === 'C'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode === 'J'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.keyCode === 'U'.charCodeAt(0)) return false;
        }
    </script>
</body>
</html>
