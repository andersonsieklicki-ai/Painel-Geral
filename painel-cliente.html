<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Cliente - Automação WhatsApp</title>
    <style>
        :root { --primary: #003399; --secondary: #f0f4f8; --success: #28a745; --text-dark: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--secondary); margin: 0; padding: 0; color: var(--text-dark); }
        .navbar { background-color: var(--primary); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; border-radius: 8px; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 4px solid var(--primary); }
        .card.full-width { grid-column: span 2; }
        .card h3 { margin-top: 0; color: var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .btn { background-color: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; transition: background 0.3s; }
        .btn:hover { background-color: #002266; }
        .btn-success { background-color: var(--success); }
        .btn-outline { background-color: transparent; color: var(--primary); border: 1px solid var(--primary); }
        .btn-danger { background-color: #dc3545; color: white; border: none; }
        .status-box { display: flex; align-items: center; justify-content: space-between; background-color: #e8f5e9; padding: 15px; border-radius: 8px; border: 1px solid #c8e6c9; margin-bottom: 20px; }
        .status-indicator { display: inline-block; width: 12px; height: 12px; background-color: var(--success); border-radius: 50%; margin-right: 8px; }
        .crm-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .search-box { flex: 1; min-width: 250px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        .table-container { overflow-y: auto; max-height: 500px; border: 1px solid #ddd; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; position: sticky; top: 0; z-index: 10; }
        .tag { font-size: 11px; padding: 4px 8px; border-radius: 12px; color: white; font-weight: bold; display: inline-block; margin: 2px; background-color: #6c757d; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; width: 500px; max-width: 90%; }
        .progress-wrapper { background: #e9ecef; border-radius: 10px; height: 25px; width: 100%; overflow: hidden; margin: 20px 0; }
        .progress-fill { background: var(--success); width: 0%; height: 100%; transition: width 0.4s ease; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: bold; }
        .upload-box { border: 2px dashed #ccc; padding: 15px; border-radius: 6px; text-align: center; margin-bottom: 15px; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } .card.full-width { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="navbar">
        <h2>Meu Painel - <span id="nomeCliente">Carregando...</span> <span id="tagPlano" style="font-size: 12px; opacity: 0.8;"></span></h2>
        <div><a href="#" onclick="fazerLogout()" style="color: white; font-weight: bold; text-decoration: none;">Sair</a></div>
    </div>

    <div class="container">
        <div class="card">
            <h3>🤖 Conexão do WhatsApp</h3>
            <div class="status-box" id="area-conexao">
                <div><span class="status-indicator"></span><strong>Verificando status...</strong></div>
            </div>
            <div id="area-qr-code" style="text-align: center; display: none;">
                <h4 id="status-texto-qr">Gerando código...</h4>
                <img id="qrcode-imagem" style="width: 200px; margin: 10px auto; display: none;">
            </div>
        </div>

        <div class="card">
            <h3>📢 Central de Promoções</h3>
            <button class="btn btn-success" style="width: 100%;" onclick="abrirModalDisparo()">🚀 Criar Nova Campanha</button>
        </div>

        <div class="card full-width">
            <h3 style="flex-wrap: wrap; gap: 10px;">
                👥 Meus Contatos (CRM)
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-outline" onclick="exportarVCF()">⬇️ Exportar (VCF)</button>
                    <button class="btn" onclick="abrirModalImportar()">⬆️ Importar</button>
                </div>
            </h3>
            
            <div class="crm-controls">
                <input type="text" id="buscaContato" class="search-box" placeholder="🔍 Buscar por nome ou número..." onkeyup="renderizarTabela()">
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-outline" onclick="etiquetarSelecionados()">🏷️ Etiquetar</button>
                    <button class="btn btn-danger" onclick="apagarTodos()">🗑️ Apagar Todos</button>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 40px;"><input type="checkbox" id="checkTodos" onclick="alternarTodosChecks()"></th>
                            <th>Nome do Cliente</th>
                            <th>WhatsApp</th>
                            <th>Etiquetas (Tags)</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaContatos">
                        <tr><td colspan="5" style="text-align: center;">Nenhum contato importado.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal" id="modalImportar">
        <div class="modal-content">
            <h3>Importar Contatos</h3>
            <input type="file" id="arquivoCsv" accept=".csv, .vcf" style="margin-bottom: 15px;">
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="btn btn-outline" onclick="fecharModalImportar()">Cancelar</button>
                <button class="btn" onclick="iniciarImportacao()">Salvar</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modalDisparo">
        <div class="modal-content">
            <h3>🚀 Disparar Campanha</h3>
            <div id="form-disparo">
                <div class="upload-box">
                    <input type="file" id="arquivoMidia" accept="image/*, application/pdf">
                </div>
                <textarea id="mensagemPromo" rows="4" placeholder="Sua mensagem..." style="width: 100%; padding: 10px; box-sizing: border-box;"></textarea>
                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 15px;">
                    <button class="btn btn-outline" onclick="fecharModalDisparo()">Cancelar</button>
                    <button class="btn btn-success" onclick="iniciarDisparo()">Enviar</button>
                </div>
            </div>
            <div id="tela-progresso" style="display: none; text-align: center;">
                <div class="progress-wrapper"><div id="barra-progresso" class="progress-fill">0%</div></div>
                <div id="texto-contagem">Processando...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4-2LavZt7iWPt2u71u-yRUYbIJu-Vzf0",
            authDomain: "central-omnichannel-saas.firebaseapp.com",
            projectId: "central-omnichannel-saas",
            storageBucket: "central-omnichannel-saas.firebasestorage.app",
            messagingSenderId: "869327159480",
            appId: "1:869327159480:web:605be5ec37ab688d44b44d",
            measurementId: "G-984WSSJBHP"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.listaContatos = [];
        window.idClienteLogado = ""; 
        window.nomeLojista = "";
        window.zapLojista = "";

        // 💾 PERSISTÊNCIA E MEMÓRIA
        window.salvarContatosLocal = function() {
            if(window.idClienteLogado) localStorage.setItem('crm_' + window.idClienteLogado, JSON.stringify(window.listaContatos));
        }

        window.carregarContatosLocal = function() {
            if(window.idClienteLogado) {
                const salvos = localStorage.getItem('crm_' + window.idClienteLogado);
                if(salvos) { window.listaContatos = JSON.parse(salvos); renderizarTabela(); }
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "empresas", user.uid));
                if (docSnap.exists()) {
                    const dados = docSnap.data();
                    window.idClienteLogado = user.uid;
                    window.nomeLojista = dados.nomeEmpresa;
                    window.zapLojista = dados.whatsappLojista || "";
                    document.getElementById('nomeCliente').innerText = dados.nomeEmpresa;
                    window.carregarContatosLocal();
                    
                    if (dados.plano === 'basico') {
                        document.getElementById('area-conexao').innerHTML = `<div><span class=\"status-indicator\"></span><strong>Conectado à Central</strong></div>`;
                    } else {
                        document.getElementById('area-conexao').innerHTML = `<button class=\"btn\" onclick=\"conectarRoboPremium()\">Conectar WhatsApp</button>`;
                    }
                }
            } else { window.location.href = "index.html"; }
        });

        // 🔍 RENDERIZAÇÃO COM BUSCA E ORDEM ALFABÉTICA
        window.renderizarTabela = function() {
            const tbody = document.getElementById('tabelaContatos');
            const termo = document.getElementById('buscaContato').value.toLowerCase();
            
            // Filtro e Ordenação
            let filtrados = window.listaContatos.filter(c => 
                c.nome.toLowerCase().includes(termo) || c.telefone.includes(termo)
            );

            filtrados.sort((a, b) => a.nome.localeCompare(b.nome));

            if(filtrados.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">Nenhum contato encontrado.</td></tr>';
                return;
            }

            tbody.innerHTML = filtrados.map(c => `
                <tr>
                    <td><input type="checkbox" class="check-contato" value="${c.id}"></td>
                    <td>${c.nome}</td>
                    <td>${c.telefone}</td>
                    <td><span class="tag">🏷️ ${c.tags[0] || 'Novo'}</span></td>
                    <td><button class="btn btn-outline" style="padding: 2px 5px;" onclick="apagarContato('${c.id}')">🗑️</button></td>
                </tr>
            `).join('');
        }

        window.iniciarImportacao = function() {
            const input = document.getElementById('arquivoCsv');
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const linhas = e.target.result.split('\n').slice(1);
                linhas.forEach(l => {
                    const col = l.split(/[,;]/);
                    if(col.length >= 2) window.listaContatos.push({ 
                        id: 'ctt_' + Math.random().toString(36).substr(2, 9), 
                        nome: col[0].trim(), 
                        telefone: col[1].replace(/\D/g, ''), 
                        tags: ['Importado'] 
                    });
                });
                renderizarTabela();
                window.salvarContatosLocal();
                fecharModalImportar();
            };
            reader.readAsText(file);
        }

        // 🚀 DISPARO COM MÍDIA (BASE64)
        window.iniciarDisparo = async function() {
            const msg = document.getElementById('mensagemPromo').value;
            const inputMidia = document.getElementById('arquivoMidia');
            const arquivo = inputMidia.files[0];
            
            if(!msg && !arquivo) return alert("Preencha a mensagem ou anexe um arquivo!");

            let midiaBase64 = null, midiaNome = "", midiaMime = "";
            if (arquivo) {
                const reader = new FileReader();
                midiaBase64 = await new Promise((res) => {
                    reader.onload = (e) => res(e.target.result.split(',')[1]);
                    reader.readAsDataURL(arquivo);
                });
                midiaNome = arquivo.name;
                midiaMime = arquivo.type;
            }

            const numeros = window.listaContatos.map(c => c.telefone);
            if(numeros.length === 0) return alert("Importe contatos primeiro!");

            document.getElementById('form-disparo').style.display = 'none';
            document.getElementById('tela-progresso').style.display = 'block';

            try {
                await fetch('/api-oracle/api/saas/disparar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-senha': '123321' },
                    body: JSON.stringify({
                        idCliente: window.idClienteLogado,
                        nomeEmpresa: window.nomeLojista,
                        zapLojista: window.zapLojista,
                        numeros: numeros,
                        mensagem: msg,
                        midia: midiaBase64,
                        midiaNome: midiaNome,
                        midiaMime: midiaMime,
                        plano: 'basico'
                    })
                });

                // Simulação de progresso visual (10s por contato como na Oracle)
                let env = 0;
                const total = numeros.length;
                let sim = setInterval(() => {
                    env++;
                    let porc = Math.round((env / total) * 100);
                    document.getElementById('barra-progresso').style.width = porc + '%';
                    document.getElementById('barra-progresso').innerText = porc + '%';
                    document.getElementById('texto-contagem').innerText = `Enviando ${env} de ${total}`;
                    if(env >= total) { clearInterval(sim); alert("Campanha iniciada com sucesso!"); fecharModalDisparo(); }
                }, 10000);
            } catch (e) { alert("Erro ao conectar com a Oracle."); fecharModalDisparo(); }
        }

        // Funções de UI
        window.apagarContato = (id) => { window.listaContatos = window.listaContatos.filter(c => c.id !== id); renderizarTabela(); window.salvarContatosLocal(); }
        window.apagarTodos = () => { if(confirm("Apagar tudo?")) { window.listaContatos = []; renderizarTabela(); window.salvarContatosLocal(); } }
        window.abrirModalImportar = () => document.getElementById('modalImportar').style.display = 'flex';
        window.fecharModalImportar = () => document.getElementById('modalImportar').style.display = 'none';
        window.abrirModalDisparo = () => { document.getElementById('modalDisparo').style.display = 'flex'; document.getElementById('form-disparo').style.display = 'block'; document.getElementById('tela-progresso').style.display = 'none'; }
        window.fecharModalDisparo = () => document.getElementById('modalDisparo').style.display = 'none';
        window.fazerLogout = () => signOut(auth).then(() => window.location.href = "index.html");
        window.alternarTodosChecks = () => { const m = document.getElementById('checkTodos'); document.querySelectorAll('.check-contato').forEach(c => c.checked = m.checked); }
    </script>
</body>
</html>
