<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Professor | Robô Escola</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #3b82f6; --success: #10b981; --text: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; font-size: 28px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background-color: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card h2 { margin-top: 0; font-size: 18px; border-bottom: 1px solid #334155; padding-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        label { display: block; margin: 15px 0 5px; font-size: 14px; color: #94a3b8; }
        input, textarea { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: white; box-sizing: border-box; font-family: inherit; }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); }
        .btn { width: 100%; padding: 12px; margin-top: 20px; background-color: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 15px; }
        .btn:hover { background-color: #2563eb; }
        .btn-green { background-color: var(--success); }
        .btn-green:hover { background-color: #059669; }
        #notificacao { position: fixed; top: 20px; right: 20px; background: var(--success); color: white; padding: 15px 20px; border-radius: 8px; font-weight: bold; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 999; }
    </style>
</head>
<body>

    <h1>👨‍🏫 Painel de Controle Pedagógico</h1>
    <div id="notificacao">✅ Ação realizada com sucesso!</div>

    <div class="grid">
        <div class="card">
            <h2>📝 Lançamento de Notas</h2>
            <p style="font-size: 13px; color: #94a3b8; margin-top: -5px;">Atualiza o boletim (Google Sheets) e avisa o aluno no WhatsApp.</p>
            
            <label>Telefone do Aluno (com DDD)</label>
            <input type="text" id="nota-telefone" placeholder="Ex: 45999999999">
            
            <label>Nota Final (Conceito ou Valor)</label>
            <input type="text" id="nota-valor" placeholder="Ex: 8.5 ou Aprovado">
            
            <button class="btn btn-green" onclick="lancarNota()">💾 Salvar Nota e Avisar</button>
        </div>

        <div class="card">
            <h2>📚 Enviar Trabalho / Material</h2>
            <p style="font-size: 13px; color: #94a3b8; margin-top: -5px;">Dispara uma atividade no WhatsApp de toda a turma.</p>

            <label>Título do Trabalho</label>
            <input type="text" id="trab-titulo" placeholder="Ex: Pesquisa de Ciências">
            
            <label>Instruções / Descrição</label>
            <textarea id="trab-desc" rows="3" placeholder="O que o aluno deve fazer?"></textarea>

            <label>Link de Apoio (Drive/YouTube) - Opcional</label>
            <input type="text" id="trab-link" placeholder="https://...">
            
            <button class="btn" onclick="enviarTrabalho()">🚀 Disparar para a Turma</button>
        </div>

        <div class="card">
            <h2>⚡ Quiz Relâmpago (Flash)</h2>
            <label>Pergunta Valendo XP Extra</label>
            <input type="text" id="quiz-pergunta" placeholder="Qual a capital do Brasil?">
            
            <label>Resposta Exata (Gabarito)</label>
            <input type="text" id="quiz-resposta" placeholder="Brasília">
            
            <button class="btn" style="background-color: #f59e0b;" onclick="dispararQuiz()">⚡ Lançar Desafio</button>
        </div>
    </div>

    <script>
        // 🚨 ATENÇÃO ANDERSON: O IP da sua Oracle está aqui com a porta 3005
        const API_URL = "http://141.148.49.219:3005/api";
        const SENHA = "123321"; // A senha secreta

        function mostrarAviso(msg) {
            const notif = document.getElementById('notificacao');
            notif.innerText = "✅ " + msg;
            notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 4000);
        }

        async function fazerRequisicao(endpoint, dados) {
            try {
                const res = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-senha': SENHA },
                    body: JSON.stringify(dados)
                });
                const resposta = await res.json();
                if(resposta.success) {
                    mostrarAviso(resposta.mensagem);
                } else {
                    alert("Erro: " + resposta.erro);
                }
            } catch (error) {
                alert("Erro ao conectar com a Oracle. O robô está online na porta 3005?");
            }
        }

        function lancarNota() {
            const telefone = document.getElementById('nota-telefone').value;
            const nota = document.getElementById('nota-valor').value;
            if(!telefone || !nota) return alert("Preencha telefone e nota!");
            fazerRequisicao('/atualizar-nota', { telefone, nota });
            document.getElementById('nota-valor').value = ""; // Limpa campo
        }

        function enviarTrabalho() {
            const titulo = document.getElementById('trab-titulo').value;
            const descricao = document.getElementById('trab-desc').value;
            const link = document.getElementById('trab-link').value;
            if(!titulo || !descricao) return alert("Preencha o título e a descrição!");
            fazerRequisicao('/enviar-trabalho', { titulo, descricao, link });
        }

        function dispararQuiz() {
            const pergunta = document.getElementById('quiz-pergunta').value;
            const resposta = document.getElementById('quiz-resposta').value;
            if(!pergunta || !resposta) return alert("Preencha a pergunta e a resposta!");
            fazerRequisicao('/quiz', { pergunta, resposta });
        }
    </script>
</body>
</html>
